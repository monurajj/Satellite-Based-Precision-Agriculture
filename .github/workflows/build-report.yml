name: Build LaTeX Report

on:
  push:
    branches: [main, feature/market-ready-webapp]
    paths:
      - 'reports/**'
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX to PDF
        uses: xu-cheng/latex-action@v4
        with:
          root_file: PROJECT_REPORT.tex
          working_directory: reports

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: PROJECT_REPORT
          path: reports/PROJECT_REPORT.pdf
